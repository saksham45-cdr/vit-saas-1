<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hotel Enrichment Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Hotel Enrichment Chat</h1>
        <p>Ask about any hotel by name and location.</p>
      </header>
      <main class="chat-container" id="chat-container"></main>
      <footer class="input-bar">
        <textarea
          id="message-input"
          rows="2"
          placeholder="Example: Tell me about Hotel Riviera in Lucerne"
        ></textarea>
        <button id="send-button">Send</button>
      </footer>
    </div>
    <script src="chat.js"></script>
  </body>
  </html>
