name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — well within Supabase's 1-week inactivity window
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Error: SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "Error: SUPABASE_SERVICE_KEY secret is not set"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/hotels?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
